server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy ────────────────────────────────────────────────────
    # Forwards /api/* to the NestJS BFF container.
    # SSE buffering is disabled so events stream in real time.
    location /api/ {
        proxy_pass              http://api:3000;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        # Required for SSE: disable response buffering
        proxy_set_header        Connection        "";
        proxy_buffering         off;
        proxy_cache             off;
        chunked_transfer_encoding on;
    }

    # ── WebSocket proxy (SSH terminal gateway) ────────────────────────────────
    location /ws {
        proxy_pass              http://api:3000;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        "upgrade";
        proxy_set_header        Host              $host;
        proxy_read_timeout      86400s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Serves index.html for all non-asset requests so @lit-labs/router handles
    # client-side navigation and deep-link refreshes work correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
